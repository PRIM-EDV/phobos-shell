
services:
  server:
    image: prim/phobos-shell:1.0.0
    build:
      context: "."
    restart: always
    container_name: "phobos-shell"
    ports:
      - "${PHOBOS_SHELL_PORT:-3001}:3001"
    environment:
      - LSX_SERVER_HOSTNAME=${LSX_SERVER_HOSTNAME}
      - LSX_SERVER_PORT=${LSX_SERVER_PORT:-3005}