
<ph-topbar style="grid-row: 1; grid-column: 2;">
    <ph-topbar-header [title]="navigation.view()?.name ?? ''" [subtitle]="navigation.tab()?.name ?? ''"></ph-topbar-header>
    @for (tab of navigation.view()?.tabs ?? []; track $index) {
        <ph-topbar-item [label]="tab.name" [class.active]="navigation.tab()?.name === tab.name" (click)="navigate(tab.route)"></ph-topbar-item>
    }
    <div style="flex-grow: 1;"> </div>
    <div class="logout" (click)="this.logout()">
        <img src="/images/logout.svg" alt="Logout">
    </div>
</ph-topbar>
<ph-sidebar [icon]="'/images/phoenix.svg'" style="grid-row: 1 / 3; grid-column: 1;">
    @for (view of navigation.views(); track $index) {
        @if (view.tabs.length > 0) {
            <ph-sidebar-item [class.active]="navigation.view()?.name === view.name" (click)="navigate(view.tabs[0].route)">{{ view.name }}</ph-sidebar-item>
        }
    }
